# .github/workflows/render-dashboards.yml
name: Render dashboard previews

on:
  push:
    paths:
      - '**/*.json'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render PNGs for changed dashboards
        env:
          GRAFANA_URL: https://grafana.ftr10.dev
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: |
          git diff --name-only HEAD~1 HEAD | grep '\.json$' | while read file; do
            uid=$(jq -r '.uid' "$file")
            dir=$(dirname "$file")
            echo "Rendering $uid from $file"
            curl -sf \
              -H "Authorization: Bearer $GRAFANA_TOKEN" \
              "$GRAFANA_URL/render/d/${uid}?width=1400&height=900&kiosk=tv" \
              -o "${dir}/${uid}.png"
          done

      - name: Commit PNGs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add **/*.png
          git diff --cached --quiet || git commit -m "chore: update dashboard previews" && git push
